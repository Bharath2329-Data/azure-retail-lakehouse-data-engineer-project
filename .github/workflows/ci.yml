name: Azure Retail Lakehouse CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate repository structure
        run: python scripts/project_validation.py

      - name: Validate Python syntax
        run: |
          python -m py_compile $(find . -name "*.py" -type f) || true

      - name: Print success message
        run: echo "CI validation completed successfully"